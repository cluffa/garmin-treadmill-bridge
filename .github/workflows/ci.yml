name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run host tests
        run: cd test/host && make

  build-heltec-v3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: boards/heltec-v3/managed_components
          key: managed-heltec-v3-${{ hashFiles('boards/heltec-v3/main/idf_component.yml') }}
      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          path: boards/heltec-v3
      - run: cp boards/heltec-v3/build/garmin-treadmill-bridge.bin garmin-treadmill-bridge-heltec-v3.bin
      - name: Merge full-flash image for web flashing
        run: |
          pip install --quiet "esptool==4.8.1"
          ( cd boards/heltec-v3/build && esptool.py --chip esp32s3 merge_bin \
              -o "$GITHUB_WORKSPACE/garmin-treadmill-bridge-heltec-v3-merged.bin" @flash_args )
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-heltec-v3
          path: |
            garmin-treadmill-bridge-heltec-v3.bin
            garmin-treadmill-bridge-heltec-v3-merged.bin

  build-xiao-c6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: boards/xiao-c6/managed_components
          key: managed-xiao-c6-${{ hashFiles('boards/xiao-c6/main/idf_component.yml') }}
      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32c6
          path: boards/xiao-c6
      - run: cp boards/xiao-c6/build/garmin-treadmill-bridge.bin garmin-treadmill-bridge-xiao-c6.bin
      - name: Merge full-flash image for web flashing
        run: |
          pip install --quiet "esptool==4.8.1"
          ( cd boards/xiao-c6/build && esptool.py --chip esp32c6 merge_bin \
              -o "$GITHUB_WORKSPACE/garmin-treadmill-bridge-xiao-c6-merged.bin" @flash_args )
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-xiao-c6
          path: |
            garmin-treadmill-bridge-xiao-c6.bin
            garmin-treadmill-bridge-xiao-c6-merged.bin

  build-garmin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate dummy developer key
        run: openssl genrsa -out developer_key.pem 4096 && openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt
      - name: Build Garmin Data Field
        uses: blackshadev/garmin-connectiq-build-action@9.1.0
        with:
          projectJungle: ./garmin_data_field/monkey.jungle
          developerKey: ./developer_key.der
          outputPath: ./garmin_data_field/out/app.prg
          device: fenix8solar51mm
      - uses: actions/upload-artifact@v4
        with:
          name: garmin-data-field-fenix8solar51mm
          path: ./garmin_data_field/out/app.prg
      - name: Build Garmin Ctrl App
        uses: blackshadev/garmin-connectiq-build-action@9.1.0
        with:
          projectJungle: ./garmin_ctrl_app/monkey.jungle
          developerKey: ./developer_key.der
          outputPath: ./garmin_ctrl_app/out/app.prg
          device: fenix8solar51mm
      - uses: actions/upload-artifact@v4
        with:
          name: garmin-ctrl-app-fenix8solar51mm
          path: ./garmin_ctrl_app/out/app.prg

  release:
    needs: [host-tests, build-heltec-v3, build-xiao-c6, build-garmin]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create or update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete nightly --yes 2>/dev/null || true
          gh release create nightly artifacts/* \
            --prerelease \
            --title "Nightly $(date -u +'%Y-%m-%d')" \
            --notes "Latest build from \`main\` — ${{ github.sha }}"
