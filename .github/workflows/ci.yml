name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run host tests
        run: cd test/host && make

  build-heltec-v3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: boards/heltec-v3/managed_components
          key: managed-heltec-v3-${{ hashFiles('boards/heltec-v3/main/idf_component.yml') }}
      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          path: boards/heltec-v3

  build-xiao-c6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: boards/xiao-c6/managed_components
          key: managed-xiao-c6-${{ hashFiles('boards/xiao-c6/main/idf_component.yml') }}
      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32c6
          path: boards/xiao-c6
