name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run host tests
        run: cd test/host && make

  build-heltec-v3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: boards/heltec-v3/managed_components
          key: managed-heltec-v3-${{ hashFiles('boards/heltec-v3/main/idf_component.yml') }}
      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          path: boards/heltec-v3
      - run: cp boards/heltec-v3/build/garmin-ftms-sync.bin garmin-ftms-sync-heltec-v3.bin
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-heltec-v3
          path: garmin-ftms-sync-heltec-v3.bin

  build-xiao-c6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: boards/xiao-c6/managed_components
          key: managed-xiao-c6-${{ hashFiles('boards/xiao-c6/main/idf_component.yml') }}
      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32c6
          path: boards/xiao-c6
      - run: cp boards/xiao-c6/build/garmin-ftms-sync.bin garmin-ftms-sync-xiao-c6.bin
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-xiao-c6
          path: garmin-ftms-sync-xiao-c6.bin

  build-garmin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate dummy developer key
        run: openssl genrsa -out developer_key.pem 4096 && openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt
      - name: Build Garmin Data Field
        uses: blackshadev/garmin-connectiq-build-action@9.1.0
        with:
          projectJungle: ./garmin_data_field/monkey.jungle
          developerKey: ./developer_key.der
          outputPath: ./garmin_data_field/out/app.prg
          device: fenix8solar51mm
      - uses: actions/upload-artifact@v4
        with:
          name: garmin-data-field-fenix8solar51mm
          path: ./garmin_data_field/out/app.prg
      - name: Build Garmin Ctrl App
        uses: blackshadev/garmin-connectiq-build-action@9.1.0
        with:
          projectJungle: ./garmin_ctrl_app/monkey.jungle
          developerKey: ./developer_key.der
          outputPath: ./garmin_ctrl_app/out/app.prg
          device: fenix8solar51mm
      - uses: actions/upload-artifact@v4
        with:
          name: garmin-ctrl-app-fenix8solar51mm
          path: ./garmin_ctrl_app/out/app.prg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: pub-
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('app/android/**/*.gradle*', 'app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - run: flutter pub get
        working-directory: app
      - run: flutter build apk --release
        working-directory: app
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: pub-
      - uses: actions/cache@v4
        with:
          path: |
            app/ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: pods-
      - run: flutter pub get
        working-directory: app
      - run: flutter build ios --no-codesign --release
        working-directory: app
      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r app/build/ios/iphoneos/Runner.app Payload/
          zip -r app-unsigned.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: app-unsigned.ipa

  release:
    needs: [host-tests, build-heltec-v3, build-xiao-c6, build-garmin, build-android, build-ios]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create or update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete nightly --yes 2>/dev/null || true
          gh release create nightly artifacts/* \
            --prerelease \
            --title "Nightly $(date -u +'%Y-%m-%d')" \
            --notes "Latest build from \`main\` — ${{ github.sha }}"
